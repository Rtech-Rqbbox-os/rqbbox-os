plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    namespace "com.rtech.rqbboxos"

    defaultConfig {
        applicationId "com.rtech.rqbboxos"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
