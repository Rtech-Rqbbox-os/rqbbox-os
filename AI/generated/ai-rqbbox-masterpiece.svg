<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050810"/><stop offset="50%" stop-color="#0a1530"/><stop offset="100%" stop-color="#150828"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/><stop offset="50%" stop-color="#9d4edd"/><stop offset="100%" stop-color="#ff00aa"/>
    </linearGradient>
    <filter id="g">
      <feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="480" fill="url(#bg)"/>
  <!-- Central RQB console -->
  <g transform="translate(400,220)">
    <rect x="-120" y="-60" width="240" height="120" rx="20" fill="#12182a" stroke="url(#g)" stroke-width="3" filter="url(#g)"/>
    <rect x="-95" y="-40" width="190" height="60" rx="8" fill="#0d1220"/>
    <text x="0" y="2" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="36" font-weight="800" fill="url(#g)" letter-spacing="4">RQB</text>
    <!-- D-pad -->
    <rect x="-90" y="22" width="32" height="10" rx="3" fill="#1e2a4a"/>
    <rect x="-78" y="10" width="10" height="34" rx="3" fill="#1e2a4a"/>
    <!-- Buttons -->
    <circle cx="70" cy="28" r="9" fill="#00d4ff" opacity="0.8"/>
    <circle cx="92" cy="16" r="9" fill="#9d4edd" opacity="0.8"/>
    <circle cx="80" cy="42" r="9" fill="#ff00aa" opacity="0.8"/>
  </g>
  <!-- Data streams -->
  <g fill="#00d4ff" opacity="0.15" font-family="Consolas,monospace" font-size="10">
    <text x="40" y="100">DATA_STREAM_INITIALIZING...</text>
    <text x="560" y="80">NODE_AUTH: OK</text>
    <text x="30" y="400">SYS: RQBBOX_0_CONNECTED</text>
    <text x="600" y="420">AI_CORE: ACTIVE</text>
    <text x="200" y="120">USB: H: [RQBBOX 0]</text>
    <text x="500" y="380">LATENCY: 0.4ms</text>
  </g>
  <!-- Decorative hex -->
  <g stroke="url(#g)" stroke-width="1" fill="none" opacity="0.1">
    <polygon points="100,200 135,180 170,200 170,240 135,260 100,240"/>
    <polygon points="630,240 665,220 700,240 700,280 665,300 630,280"/>
  </g>
  <text x="400" y="460" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="16" fill="url(#g)" opacity="0.6" letter-spacing="6" filter="url(#g)">RQBBOX 0 · AI MASTERPIECE</text>
</svg>