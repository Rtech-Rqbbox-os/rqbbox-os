<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#0a0520"/>
      <stop offset="60%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#020208"/>
    </radialGradient>
    <radialGradient id="portal" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="20%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#9d4edd" stop-opacity="0.2"/>
      <stop offset="80%" stop-color="#ff00aa" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="480" fill="url(#bg)"/>
  <rect width="800" height="480" fill="url(#portal)"/>
  <!-- Portal rings -->
  <g filter="url(#glow)">
    <ellipse cx="400" cy="240" rx="140" ry="140" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.4"/>
    <ellipse cx="400" cy="240" rx="110" ry="110" fill="none" stroke="#9d4edd" stroke-width="2" opacity="0.5"/>
    <ellipse cx="400" cy="240" rx="80" ry="80" fill="none" stroke="#ff00aa" stroke-width="2" opacity="0.4"/>
    <ellipse cx="400" cy="240" rx="50" ry="50" fill="none" stroke="#00ffc8" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Center core -->
  <circle cx="400" cy="240" r="20" fill="#fff" opacity="0.15"/>
  <circle cx="400" cy="240" r="10" fill="#00d4ff" opacity="0.3"/>
  <!-- Particle trails -->
  <g fill="#00d4ff" opacity="0.4">
    <circle cx="260" cy="240" r="2" filter="url(#glow)"/>
    <circle cx="540" cy="240" r="2" filter="url(#glow)"/>
    <circle cx="400" cy="100" r="2" filter="url(#glow)"/>
    <circle cx="400" cy="380" r="2" filter="url(#glow)"/>
    <circle cx="300" cy="180" r="1.5" opacity="0.3"/>
    <circle cx="500" cy="300" r="1.5" opacity="0.3"/>
    <circle cx="310" cy="290" r="1" opacity="0.2"/>
    <circle cx="490" cy="190" r="1" opacity="0.2"/>
  </g>
  <text x="400" y="470" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" fill="#9d4edd" opacity="0.5" letter-spacing="6">VOID PORTAL · AI GENERATED</text>
</svg>