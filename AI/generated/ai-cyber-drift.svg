<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/><stop offset="50%" stop-color="#0a0820"/><stop offset="100%" stop-color="#150520"/>
    </linearGradient>
    <linearGradient id="trail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/><stop offset="30%" stop-color="#00d4ff" stop-opacity="0.8"/><stop offset="70%" stop-color="#9d4edd" stop-opacity="0.8"/><stop offset="100%" stop-color="#ff00aa" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bg)"/>
  <!-- Track lines -->
  <g stroke="rgba(0,212,255,0.08)" stroke-width="1">
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
  </g>
  <!-- Ghost car trails -->
  <path d="M0 260 Q100 240 200 250 T400 230 T600 260 T800 240" fill="none" stroke="url(#trail)" stroke-width="6" opacity="0.6"/>
  <path d="M0 260 Q100 240 200 250 T400 230 T600 260 T800 240" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <!-- Car body -->
  <g transform="translate(550,225)">
    <rect x="0" y="0" width="80" height="20" rx="6" fill="#0d1220" stroke="#00d4ff" stroke-width="2"/>
    <rect x="10" y="-8" width="50" height="10" rx="5" fill="#0d1220" stroke="#9d4edd" stroke-width="1.5"/>
    <circle cx="20" cy="24" r="6" fill="#12182a" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="60" cy="24" r="6" fill="#12182a" stroke="#00d4ff" stroke-width="2"/>
    <rect x="70" y="2" width="12" height="16" rx="3" fill="#ff00aa" opacity="0.5"/>
  </g>
  <!-- Speed lines -->
  <g stroke="#00d4ff" stroke-width="1" opacity="0.15">
    <line x1="50" y1="210" x2="200" y2="210"/><line x1="80" y1="270" x2="250" y2="270"/>
    <line x1="120" y1="200" x2="180" y2="200"/><line x1="30" y1="260" x2="220" y2="260"/>
    <line x1="200" y1="240" x2="350" y2="240"/><line x1="250" y1="250" x2="400" y2="250"/>
  </g>
  <!-- Grid pattern -->
  <g stroke="#00d4ff" stroke-width="0.5" opacity="0.04">
    <line x1="160" y1="160" x2="160" y2="320"/><line x1="320" y1="160" x2="320" y2="320"/>
    <line x1="480" y1="160" x2="480" y2="320"/><line x1="640" y1="160" x2="640" y2="320"/>
  </g>
  <text x="400" y="470" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" fill="#00d4ff" opacity="0.5" letter-spacing="8">CYBER DRIFT · AI GENERATED</text>
</svg>