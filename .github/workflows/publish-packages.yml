name: Publish GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-root:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@rtech-rqbbox-os'
      - run: npm publish
        working-directory: .
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@rtech-rqbbox-os'
      - run: npm publish
        working-directory: System/Server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-sdk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@rtech-rqbbox-os'
      - run: npm publish
        working-directory: System/SDK
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
