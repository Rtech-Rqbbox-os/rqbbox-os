<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Fighter X</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const COLORS = {
  cyan: '#00f0ff',
  blue: '#0066ff',
  purple: '#8800ff',
  pink: '#ff00ff',
  dark: '#0a0a1a',
  white: '#ffffff'
};

let stars = [];
for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2 + 0.5,
    speed: Math.random() * 2 + 0.5,
    brightness: Math.random() * 0.5 + 0.5
  });
}

const player = {
  x: canvas.width / 2,
  y: canvas.height - 80,
  width: 40,
  height: 50,
  speed: 5,
  lives: 3,
  invincible: 0
};

let bullets = [];
let enemies = [];
let particles = [];
let score = 0;
let gameOver = false;
let keys = {};

const keysMap = {
  'ArrowLeft': 'left', 'ArrowRight': 'right', 'ArrowUp': 'up', 'ArrowDown': 'down',
  'a': 'left', 'd': 'right', 'w': 'up', 's': 'down',
  'A': 'left', 'D': 'right', 'W': 'up', 'S': 'down'
};

document.addEventListener('keydown', e => {
  if (e.key === ' ') {
    e.preventDefault();
    if (gameOver) {
      restartGame();
      return;
    }
    shoot();
  }
  if (keysMap[e.key]) keys[keysMap[e.key]] = true;
  if (e.key === 'r' || e.key === 'R') { if (gameOver) restartGame(); }
});

document.addEventListener('keyup', e => {
  if (keysMap[e.key]) keys[keysMap[e.key]] = false;
});

document.addEventListener('keydown', e => {
  if (e.key === ' ') e.preventDefault();
});

function shoot() {
  if (gameOver) return;
  bullets.push({
    x: player.x,
    y: player.y - player.height / 2 - 10,
    w: 4,
    h: 14,
    speed: 8
  });
}

function spawnEnemy() {
  const type = Math.random();
  let enemy;
  if (type < 0.6) {
    enemy = { type: 'basic', x: 0, y: 0, w: 30, h: 30, hp: 1, speed: 1.5 + Math.random(), color: COLORS.cyan, points: 10 };
  } else if (type < 0.85) {
    enemy = { type: 'tough', x: 0, y: 0, w: 36, h: 36, hp: 2, speed: 1 + Math.random(), color: COLORS.purple, points: 25 };
  } else {
    enemy = { type: 'fast', x: 0, y: 0, w: 24, h: 24, hp: 1, speed: 3 + Math.random() * 1.5, color: COLORS.pink, points: 20 };
  }
  enemy.x = Math.random() * (canvas.width - enemy.w);
  enemy.y = -enemy.h;
  enemies.push(enemy);
}

let lastEnemySpawn = 0;
let enemySpawnRate = 800;

function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: Math.random() * 0.03 + 0.02,
      size: Math.random() * 4 + 2,
      color
    });
  }
}

function drawShip(x, y, w, h, color) {
  const cx = x, cy = y + h / 2;
  ctx.save();
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }

  ctx.shadowColor = color;
  ctx.shadowBlur = 15;

  ctx.beginPath();
  ctx.moveTo(cx, y);
  ctx.lineTo(cx - w / 2, y + h);
  ctx.lineTo(cx - w / 4, y + h - 8);
  ctx.lineTo(cx, y + h - 4);
  ctx.lineTo(cx + w / 4, y + h - 8);
  ctx.lineTo(cx + w / 2, y + h);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = COLORS.white;
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.shadowBlur = 8;
  ctx.fillStyle = COLORS.cyan;
  ctx.fillRect(cx - 2, y + h - 6, 4, 6);

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.shadowColor = e.color;
  ctx.shadowBlur = 10;

  if (e.type === 'basic') {
    ctx.beginPath();
    ctx.moveTo(e.x + e.w / 2, e.y + e.h);
    ctx.lineTo(e.x, e.y);
    ctx.lineTo(e.x + e.w / 4, e.y + 6);
    ctx.lineTo(e.x + e.w / 2, e.y);
    ctx.lineTo(e.x + e.w * 3 / 4, e.y + 6);
    ctx.lineTo(e.x + e.w, e.y);
    ctx.closePath();
    ctx.fillStyle = e.color;
    ctx.fill();
    ctx.strokeStyle = COLORS.white;
    ctx.lineWidth = 1;
    ctx.stroke();
  } else if (e.type === 'tough') {
    ctx.beginPath();
    const cx = e.x + e.w / 2, cy = e.y + e.h / 2, r = e.w / 2;
    for (let i = 0; i < 6; i++) {
      const angle = -Math.PI / 2 + i * Math.PI / 3;
      const px = cx + Math.cos(angle) * r;
      const py = cy + Math.sin(angle) * r;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fillStyle = e.color;
    ctx.fill();
    ctx.strokeStyle = COLORS.cyan;
    ctx.lineWidth = 1;
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 2, 0, Math.PI * 2);
    ctx.fillStyle = e.color;
    ctx.fill();
    ctx.strokeStyle = COLORS.white;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  ctx.restore();
}

function update() {
  if (gameOver) return;

  if (keys.left) player.x -= player.speed;
  if (keys.right) player.x += player.speed;
  if (keys.up) player.y -= player.speed;
  if (keys.down) player.y += player.speed;

  player.x = Math.max(player.width / 2, Math.min(canvas.width - player.width / 2, player.x));
  player.y = Math.max(player.height / 2, Math.min(canvas.height - player.height / 2, player.y));

  if (player.invincible > 0) player.invincible--;

  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.y -= b.speed;
    if (b.y < -20) { bullets.splice(i, 1); continue; }

    let hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
        e.hp--;
        hit = true;
        if (e.hp <= 0) {
          spawnParticles(e.x + e.w / 2, e.y + e.h / 2, e.color, 20);
          score += e.points;
          enemies.splice(j, 1);
        }
        break;
      }
    }
    if (hit) { bullets.splice(i, 1); }
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed;
    if (e.y > canvas.height + 20) {
      enemies.splice(i, 1);
      continue;
    }
    if (player.invincible <= 0) {
      const px = player.x, py = player.y;
      if (px > e.x && px < e.x + e.w && py > e.y && py < e.y + e.h) {
        spawnParticles(px, py, COLORS.cyan, 30);
        player.lives--;
        player.invincible = 60;
        if (player.lives <= 0) {
          gameOver = true;
          parent.postMessage({type:'rqbbox-toast',message:'Game Over! Score: ' + score},'*');
        }
        enemies.splice(i, 1);
      }
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    p.vy += 0.05;
    if (p.life <= 0) { particles.splice(i, 1); }
  }

  const now = Date.now();
  if (now - lastEnemySpawn > enemySpawnRate) {
    spawnEnemy();
    lastEnemySpawn = now;
    enemySpawnRate = Math.max(300, enemySpawnRate - 2);
  }
}

function drawStars() {
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > canvas.height) { s.y = -2; s.x = Math.random() * canvas.width; }
    const alpha = s.brightness * (0.7 + 0.3 * Math.sin(Date.now() / 1000 + s.x));
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawHUD() {
  ctx.save();

  ctx.shadowColor = COLORS.cyan;
  ctx.shadowBlur = 10;
  ctx.font = 'bold 20px monospace';
  ctx.fillStyle = COLORS.cyan;
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 20, 35);

  ctx.textAlign = 'right';
  ctx.fillStyle = COLORS.pink;
  let livesStr = '';
  for (let i = 0; i < player.lives; i++) livesStr += '♥ ';
  ctx.fillText('LIVES: ' + livesStr.trim(), canvas.width - 20, 35);

  ctx.restore();
}

function drawGameOver() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.shadowColor = COLORS.cyan;
  ctx.shadowBlur = 30;
  ctx.font = 'bold 60px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = COLORS.cyan;
  ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 60);

  ctx.shadowBlur = 15;
  ctx.font = 'bold 36px monospace';
  ctx.fillStyle = COLORS.pink;
  ctx.fillText('SCORE: ' + score, canvas.width / 2, canvas.height / 2 + 10);

  ctx.shadowBlur = 8;
  ctx.font = '18px monospace';
  ctx.fillStyle = COLORS.purple;
  ctx.fillText('Press SPACE or R to Restart', canvas.width / 2, canvas.height / 2 + 70);

  ctx.restore();
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(0,240,255,0.04)';
  ctx.lineWidth = 1;
  const spacing = 60;
  for (let x = 0; x < canvas.width; x += spacing) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += spacing) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
}

function draw() {
  ctx.fillStyle = COLORS.dark;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawGrid();
  drawStars();

  bullets.forEach(b => {
    ctx.save();
    ctx.shadowColor = COLORS.cyan;
    ctx.shadowBlur = 12;
    const grad = ctx.createLinearGradient(b.x, b.y, b.x + b.w, b.y + b.h);
    grad.addColorStop(0, COLORS.cyan);
    grad.addColorStop(1, COLORS.white);
    ctx.fillStyle = grad;
    ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
    ctx.restore();
  });

  enemies.forEach(e => drawEnemy(e));

  if (player.invincible === 0 || Math.floor(player.invincible / 4) % 2 === 0) {
    drawShip(player.x - player.width / 2, player.y - player.height / 2, player.width, player.height, COLORS.cyan);
  }

  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  drawHUD();
  if (gameOver) drawGameOver();
}

function restartGame() {
  player.x = canvas.width / 2;
  player.y = canvas.height - 80;
  player.lives = 3;
  player.invincible = 60;
  bullets = [];
  enemies = [];
  particles = [];
  score = 0;
  gameOver = false;
  lastEnemySpawn = 0;
  enemySpawnRate = 800;
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
