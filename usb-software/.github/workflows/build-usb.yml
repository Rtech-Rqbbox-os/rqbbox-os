name: 🔧 Build RQBBOX USB Software

on:
  push:
    paths:
      - 'usb-software/**'
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-windows:
    name: 💻 Build Windows USB Launcher
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & Build
        working-directory: usb-software/launcher/windows
        run: |
          npm install
          npm run build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rqbbox-usb-windows
          path: usb-software/launcher/windows/dist/

  build-macos:
    name: 🍏 Build macOS USB Launcher
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & Build
        working-directory: usb-software/launcher/macos
        run: |
          npm install
          npm run build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rqbbox-usb-macos
          path: usb-software/launcher/macos/dist/

  build-linux:
    name: 🐧 Build Linux USB Launcher
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
      - name: Install & Build
        working-directory: usb-software/launcher/linux
        run: |
          npm install
          npm run build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rqbbox-usb-linux
          path: usb-software/launcher/linux/dist/

  release-usb:
    name: 📦 Publish USB Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
