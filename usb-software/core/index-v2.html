<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RQBBOX OS v2.6.0.4</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#0a0a0a; color:#fff;
      font-family:'Segoe UI','Inter',Arial,sans-serif;
      display:flex; align-items:center; justify-content:center;
      height:100vh; overflow:hidden;
    }
    .splash { text-align:center; animation:fadeIn 0.8s ease; max-width:420px; padding:20px; }
    .logo { width:110px; height:110px; margin:0 auto 24px; border-radius:22px; overflow:hidden; border:2px solid #00f5ff33; }
    .logo img { width:100%; height:100%; object-fit:cover; }
    .banner { width:100%; max-width:400px; border-radius:12px; margin:0 auto 24px; display:block; }
    h1 {
      font-size:34px; font-weight:900; letter-spacing:4px; margin-bottom:4px;
      background:linear-gradient(135deg,#00f5ff,#9b30ff);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .ver { color:#00f5ff; font-size:13px; letter-spacing:3px; margin-bottom:6px; }
    p   { color:#555; font-size:13px; letter-spacing:1.5px; margin-bottom:36px; }
    .spinner {
      width:38px; height:38px; border:3px solid #1a1a1a;
      border-top:3px solid #00f5ff; border-radius:50%;
      animation:spin 0.8s linear infinite; margin:0 auto 28px;
    }
    .btn {
      display:inline-block;
      background:linear-gradient(135deg,#00f5ff,#9b30ff);
      color:#0a0a0a; font-weight:800; font-size:14px;
      padding:13px 36px; border-radius:12px; text-decoration:none; letter-spacing:0.5px;
    }
    @keyframes spin    { to { transform:rotate(360deg); } }
    @keyframes fadeIn  { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo">
      <img src="https://media.base44.com/images/public/6a0d64e743c742005c890c76/16da7f339_generated_image.png" alt="RQBBOX OS"/>
    </div>
    <img class="banner" src="https://media.base44.com/images/public/6a0d64e743c742005c890c76/dbaa9145d_generated_image.png" alt="RQBBOX OS v2.6.0.4"/>
    <h1>RQBBOX OS</h1>
    <div class="ver">v2.6.0.4</div>
    <p>PLUG IN · PLAY ANYWHERE</p>
    <div class="spinner"></div>
    <a class="btn" href="https://inquisitive-rqbbox-core-play.base44.app">Launch RQBBOX App ▶</a>
  </div>
  <script>
    setTimeout(() => {
      window.location.href = 'https://inquisitive-rqbbox-core-play.base44.app';
    }, 3000);
  </script>
</body>
</html>
