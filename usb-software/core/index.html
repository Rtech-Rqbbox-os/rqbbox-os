<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RQBBOX OS — Loading</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .splash {
      text-align: center;
      animation: fadeIn 0.8s ease;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 28px;
      border-radius: 24px;
      background: linear-gradient(135deg, #00f5ff22, #9b30ff22);
      border: 2px solid #00f5ff44;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
    }
    h1 {
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(135deg, #00f5ff, #9b30ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    p {
      color: #666;
      font-size: 14px;
      margin-bottom: 40px;
      letter-spacing: 1px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #1a1a1a;
      border-top: 3px solid #00f5ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo">🎮</div>
    <h1>RQBBOX OS</h1>
    <p>PLUG IN · PLAY ANYWHERE</p>
    <div class="spinner"></div>
  </div>
  <script>
    // Redirect to RQBBOX OS app after splash
    setTimeout(() => {
      window.location.href = 'https://app.base44.com/apps/6a0d64e743c742005c890c76';
    }, 2000);
  </script>
</body>
</html>
