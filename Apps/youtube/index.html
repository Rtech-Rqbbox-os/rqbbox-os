<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>YouTube</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050810;color:#e8f0ff;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh;width:100vw}
.loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;background:#050810;transition:opacity .4s}
.loading.hide{opacity:0;pointer-events:none}
.app-icon{font-size:5rem;margin-bottom:20px;animation:float 3s ease-in-out infinite}
.app-name{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#00d4ff,#9d4edd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.1);border-top-color:#00d4ff;border-radius:50%;animation:spin .8s linear infinite;margin-top:20px}
.fallback{display:none;text-align:center}
.fallback.show{display:flex;flex-direction:column;align-items:center}
.fallback .app-desc{color:#ff6b6b;font-size:.95rem;margin-bottom:24px;max-width:400px;line-height:1.6}
.btn-group{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn-primary{background:linear-gradient(135deg,#00d4ff,#9d4edd);border:none;color:#fff;padding:12px 32px;border-radius:14px;font-size:1rem;font-weight:600;cursor:pointer;transition:transform .2s,box-shadow .2s;font-family:inherit}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,212,255,.3)}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.1);color:#8b9dc3;padding:12px 32px;border-radius:14px;font-size:1rem;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-ghost:hover{border-color:#00d4ff;color:#00d4ff}
.top-bar{position:fixed;top:0;left:0;right:0;z-index:3;display:flex;justify-content:flex-end;padding:12px 16px;gap:10px}
.top-bar a{color:#8b9dc3;font-size:.82rem;text-decoration:none;padding:6px 14px;border-radius:10px;background:rgba(5,8,16,.7);border:1px solid rgba(255,255,255,.06);transition:all .2s;cursor:pointer;font-family:inherit}
.top-bar a:hover{color:#00d4ff;border-color:#00d4ff}
iframe{position:fixed;inset:0;width:100%;height:100%;border:none;display:none;z-index:1}
iframe.show{display:block}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="top-bar">
<a onclick="window.open('https://www.youtube.com/','_blank')">↗ Open in Browser</a>
<a onclick="window.parent.postMessage('rqbbox-exit','*')">← Back</a>
</div>
<div class="loading" id="loading">
<div class="app-icon">📺</div>
<div class="app-name">YouTube</div>
<div class="spinner"></div>
<div class="fallback" id="fallback">
<div class="app-desc">This site can't be embedded in an overlay</div>
<div class="btn-group">
<button class="btn-primary" onclick="window.open('https://www.youtube.com/','_blank')">Open in Browser</button>
<button class="btn-ghost" onclick="window.parent.postMessage('rqbbox-exit','*')">Back to RQBBOX</button>
</div>
</div>
</div>
<iframe id="app-frame" class="show" src="https://www.youtube.com/" allow="camera;microphone;fullscreen;autoplay" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
<script>
(function(){
var loading=document.getElementById('loading');
var frame=document.getElementById('app-frame');
var fallback=document.getElementById('fallback');
var loaded=false;
frame.addEventListener('load',function(){loaded=true;loading.classList.add('hide');});
frame.addEventListener('error',function(){if(!loaded){loaded=true;fallback.classList.add('show');document.querySelector('.spinner').style.display='none';}});
setTimeout(function(){if(!loaded){loaded=true;fallback.classList.add('show');document.querySelector('.spinner').style.display='none';}},4000);
})();
</script>
</body>
</html>
