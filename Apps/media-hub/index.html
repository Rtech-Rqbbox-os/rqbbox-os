<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Media Hub</title>
<style>
body{margin:0;background:#0a0e1a;color:#e8f0ff;font-family:Segoe UI,sans-serif;height:100vh;display:flex;flex-direction:column;padding:16px}
h3{margin:0 0 12px}
#list{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
#list button{padding:8px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#8b9dc3;cursor:pointer}
#list button:hover,#list button.active{border-color:#00d4ff;color:#00d4ff}
.player{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#12182a;border-radius:12px;border:1px solid rgba(0,212,255,.15)}
audio,video{max-width:100%;max-height:60vh}
.controls{display:flex;gap:12px;margin-top:16px}
.controls button{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#00d4ff,#9d4edd);border:none;color:#fff;font-size:18px;cursor:pointer}
</style>
</head>
<body>
<h3>🎬 Media Hub</h3>
<div id="list"></div>
<div class="player">
  <video id="vid" controls style="display:none"></video>
  <audio id="aud" controls style="display:none"></audio>
  <p id="label" style="color:#8b9dc3">Select media or open a file</p>
  <div class="controls">
    <button id="open">📂 Open File</button>
  </div>
</div>
<script>
const API='http://127.0.0.1:19777';
const aud=document.getElementById('aud'),vid=document.getElementById('vid'),label=document.getElementById('label');
async function loadList(){
  const r=await fetch(API+'/api/files?path=Media');
  const d=await r.json();
  const list=document.getElementById('list');
  list.innerHTML='';
  (d.items||[]).filter(i=>i.type==='file').forEach(f=>{
    const b=document.createElement('button');b.textContent=f.name;
    b.onclick=()=>play('Media/'+f.name,f.ext);list.appendChild(b);
  });
  if(!list.children.length){const b=document.createElement('button');b.textContent='(No files — add to Media folder)';list.appendChild(b)}
}
function play(path,ext){
  const url=API+'/api/file/read?path='+encodeURIComponent(path);
  label.style.display='none';
  if(['.mp4','.webm'].includes(ext)){vid.style.display='block';aud.style.display='none';vid.src=url;vid.play()}
  else{aud.style.display='block';vid.style.display='none';aud.src=url;aud.play()}
}
document.getElementById('open').onclick=()=>{
  const inp=document.createElement('input');inp.type='file';inp.accept='audio/*,video/*';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const u=URL.createObjectURL(f);
  if(f.type.startsWith('video')){vid.src=u;vid.style.display='block';aud.style.display='none';vid.play()}
  else{aud.src=u;aud.style.display='block';vid.style.display='none';aud.play()}label.style.display='none'};
  inp.click();
};
loadList();
</script>
</body>
</html>
