  <text x="580" y="269" font-family="Segoe UI,sans-serif" font-size="10" fill="rgba(255,255,255,.5)"><tspan font-weight="700" fill="rgba(255,255,255,.7)">?? PS5 UI</tspan> Ģ Dark minimal</text>
  <rect x="890" y="249" width="310" height="30" rx="6" fill="rgba(255,255,255,.02)" stroke="rgba(255,255,255,.04)"/>
  <text x="900" y="269" font-family="Segoe UI,sans-serif" font-size="10" fill="rgba(255,255,255,.5)"><tspan font-weight="700" fill="rgba(255,255,255,.7)">?? Pro Audio</tspan> Ģ 40+ synth</text>
  <rect x="570" y="283" width="310" height="30" rx="6" fill="rgba(255,255,255,.02)" stroke="rgba(255,255,255,.04)"/>
  <text x="580" y="303" font-family="Segoe UI,sans-serif" font-size="10" fill="rgba(255,255,255,.5)"><tspan font-weight="700" fill="rgba(255,255,255,.7)">?? Phone Boot</tspan> Ģ Auto-detect</text>
  <rect x="890" y="283" width="310" height="30" rx="6" fill="rgba(255,255,255,.02)" stroke="rgba(255,255,255,.04)"/>
  <text x="900" y="303" font-family="Segoe UI,sans-serif" font-size="10" fill="rgba(255,255,255,.5)"><tspan font-weight="700" fill="rgba(255,255,255,.7)">?? Multi-User</tspan> Ģ Auth, sync</text>
