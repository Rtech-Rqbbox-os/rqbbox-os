  <text x="80" y="118" font-family="Segoe UI,sans-serif" font-size="12" fill="rgba(255,255,255,.4)">Portable USB Gaming OS by RhysTech</text>
  <rect x="80" y="135" width="380" height="34" rx="100" fill="rgba(0,212,255,.08)" stroke="rgba(0,212,255,.1)"/>
