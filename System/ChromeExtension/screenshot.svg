  <text x="580" y="425" font-family="Segoe UI,sans-serif" font-size="9" fill="rgba(255,255,255,.5)">Feature</text>
  <text x="720" y="425" font-family="Segoe UI,sans-serif" font-size="9" fill="rgba(255,255,255,.5)">Lite</text>
  <text x="820" y="425" font-family="Segoe UI,sans-serif" font-size="9" fill="rgba(255,255,255,.5)">Pro</text>
  <text x="920" y="425" font-family="Segoe UI,sans-serif" font-size="9" fill="rgba(255,255,255,.5)">Creator</text>
  <text x="580" y="440" font-family="Segoe UI,sans-serif" font-size="9" fill="rgba(255,255,255,.5)">Game library</text>
  <text x="720" y="440" font-family="Segoe UI,sans-serif" font-size="9" fill="#fff">10 max</text>
  <text x="820" y="440" font-family="Segoe UI,sans-serif" font-size="9" fill="#00d4ff">Unlimited</text>
  <text x="920" y="440" font-family="Segoe UI,sans-serif" font-size="9" fill="#00d4ff">Unlimited</text>
