<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RQBBOX OS Extension Options</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 32px; max-width: 600px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .sub { color: rgba(255,255,255,.4); margin-bottom: 24px; font-size: .85rem; }
    .section { margin-bottom: 20px; }
    .section h2 { font-size: .9rem; text-transform: uppercase; letter-spacing: .4px; color: rgba(255,255,255,.5); margin-bottom: 8px; }
    label { display: block; font-size: .82rem; color: rgba(255,255,255,.6); margin-bottom: 4px; }
    input[type="text"] { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.05); color: #fff; font-family: inherit; font-size: .82rem; }
    .btn { padding: 8px 20px; border-radius: 8px; font-size: .8rem; font-weight: 600; cursor: pointer; border: none; background: linear-gradient(135deg, #007bff, #00d4ff); color: #fff; }
    .btn:hover { transform: translateY(-1px); }
    .saved { color: #4cff88; font-size: .78rem; margin-left: 8px; opacity: 0; transition: opacity .3s; }
    .saved.show { opacity: 1; }
  </style>
</head>
<body>
  <h1>RQBBOX OS</h1>
  <div class="sub">Extension Settings</div>

  <div class="section">
    <h2>Local Server</h2>
    <label>Server URL</label>
    <input type="text" id="server-url" value="http://localhost:19777" readonly>
  </div>

  <div class="section">
    <h2>About</h2>
    <p style="font-size:.78rem;color:rgba(255,255,255,.4);line-height:1.6;">
      RQBBOX OS v1.2.0 &bull; MIT License &bull; By RhysTech<br>
      <a href="https://github.com/Rtech-Rqbbox-os/rqbbox-os" target="_blank" style="color:#66b5ff;">GitHub</a>
    </p>
  </div>

  <button class="btn" onclick="save()">Save Settings</button>
  <span class="saved" id="saved">Saved</span>

  <script>
    function save() {
      document.getElementById('saved').classList.add('show');
      setTimeout(() => document.getElementById('saved').classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
