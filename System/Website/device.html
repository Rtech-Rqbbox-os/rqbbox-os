<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Devices — RhysTech</title>
  <style>
    :root {
      --bg: #050810;
      --bg-card: rgba(12, 18, 36, 0.85);
      --neon-blue: #00d4ff;
      --neon-purple: #9d4edd;
      --text: #e8f0ff;
      --text-muted: #5a6a8a;
      --text-secondary: #8b9dc3;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 40px; padding-bottom: 20px;
      border-bottom: 1px solid rgba(0,212,255,0.1);
    }
    .logo { font-size: 1.5rem; font-weight: 800; color: var(--neon-blue); }
    .logo span { color: var(--neon-purple); }
    .status { font-size: 0.85rem; color: var(--text-muted); }
    h1 { font-size: 1.8rem; margin-bottom: 8px; }
    .subtitle { color: var(--text-secondary); margin-bottom: 32px; }
    .device-card {
      background: var(--bg-card);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: all 0.2s;
    }
    .device-card:hover { border-color: var(--neon-blue); transform: translateY(-2px); }
    .device-icon { font-size: 2.5rem; width: 60px; text-align: center; }
    .device-info { flex: 1; }
    .device-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .device-meta { font-size: 0.8rem; color: var(--text-muted); display: flex; gap: 16px; flex-wrap: wrap; }
    .device-tag {
      display: inline-block; padding: 2px 10px;
      background: rgba(0,212,255,0.1); border-radius: 8px;
      font-size: 0.7rem; color: var(--neon-blue);
    }
    .device-date { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }
    .empty {
      text-align: center; padding: 60px 20px;
      color: var(--text-muted); font-size: 1rem;
    }
    .login-prompt {
      text-align: center; padding: 80px 20px;
    }
    .btn {
      display: inline-block; padding: 14px 32px;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
      color: #fff; border: none; border-radius: 14px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      text-decoration: none; margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">Rhys<span>Tech</span></div>
      <div class="status" id="status">Checking...</div>
    </header>
    <h1>📱 My Devices</h1>
    <p class="subtitle">USB drives and devices connected to your RhysTech account</p>
    <div id="device-list"></div>
  </div>
  <script>
    async function loadDevices() {
      const list = document.getElementById('device-list');
      const status = document.getElementById('status');
      try {
        const res = await fetch('http://127.0.0.1:19777/api/device');
        const data = await res.json();
        if (data.ok && data.devices?.length) {
          status.textContent = `${data.devices.length} device(s) registered`;
          list.innerHTML = data.devices.map(d => `
            <div class="device-card">
              <div class="device-icon">💻</div>
              <div class="device-info">
                <div class="device-name">${d.name || d.label || 'USB Drive'}</div>
                <div class="device-meta">
                  <span>${d.platform || 'Unknown OS'}</span>
                  <span>${d.totalGB ? d.totalGB + ' GB' : ''}</span>
                  <span class="device-tag">${d.type || 'USB'}</span>
                  <span>${d.screen || ''}</span>
                </div>
              </div>
              <div class="device-date">${d.lastSeen ? new Date(d.lastSeen).toLocaleDateString() : ''}</div>
            </div>
          `).join('');
        } else {
          list.innerHTML = '<div class="empty">No devices registered yet.<br>Plug in RQBBOX OS and log into your RhysTech account to register this device.</div>';
          status.textContent = 'No devices';
        }
      } catch {
        list.innerHTML = '<div class="empty">Could not connect to RQBBOX server.<br>Make sure RQBBOX OS is running on this computer.</div>';
        status.textContent = 'Server offline';
      }
    }
    loadDevices();
  </script>
</body>
</html>
