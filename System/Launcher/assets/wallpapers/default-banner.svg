<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="40%" stop-color="#0a1020"/>
      <stop offset="100%" stop-color="#120a28"/>
    </linearGradient>
    <radialGradient id="orb1" cx="20%" cy="30%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="70%">
      <stop offset="0%" stop-color="#9d4edd" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9d4edd" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff00aa" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#orb1)"/>
  <rect width="1920" height="1080" fill="url(#orb2)"/>
  <!-- Grid -->
  <g opacity="0.08" stroke="#00d4ff" stroke-width="1">
    <line x1="0" y1="270" x2="1920" y2="270"/><line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="810" x2="1920" y2="810"/><line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/><line x1="1440" y1="0" x2="1440" y2="1080"/>
  </g>
  <line x1="0" y1="900" x2="1920" y2="900" stroke="url(#line)" stroke-width="2"/>
  <text x="960" y="480" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="120" font-weight="800" fill="#ffffff" opacity="0.06" letter-spacing="20">RQBBOX</text>
  <text x="960" y="980" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#00d4ff" opacity="0.5" letter-spacing="8">PLUG IN. PLAY ANYWHERE.</text>
</svg>
