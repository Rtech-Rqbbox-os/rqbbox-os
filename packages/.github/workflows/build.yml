name: Build RQBBOX OS — All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: packages/windows
        run: npm ci
      - name: Build Windows installer
        working-directory: packages/windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CERT_PATH: ${{ secrets.WIN_CERT_PATH }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: npm run build:all
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: packages/windows/dist/*.exe

  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: packages/macos
        run: npm ci
      - name: Build macOS DMG
        working-directory: packages/macos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run build:all
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: packages/macos/dist/*.dmg

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: packages/linux
        run: npm ci
      - name: Build Linux packages
        working-directory: packages/linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:all
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            packages/linux/dist/*.AppImage
            packages/linux/dist/*.deb
            packages/linux/dist/*.rpm

  build-android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build APK & AAB
        working-directory: packages/android
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease assembleRelease
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            packages/android/app/build/outputs/apk/release/*.apk
            packages/android/app/build/outputs/bundle/release/*.aab

  build-ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app
      - name: Install CocoaPods
        working-directory: packages/ios
        run: pod install
      - name: Build IPA
        working-directory: packages/ios
        env:
          RTECH_TEAM_ID: ${{ secrets.RTECH_TEAM_ID }}
        run: |
          xcodebuild -workspace RQBBOXOSLauncher.xcworkspace \
            -scheme RQBBOXOSLauncher \
            -configuration Release \
            -archivePath build/RQBBOXOSLauncher.xcarchive \
            archive
          xcodebuild -exportArchive \
            -archivePath build/RQBBOXOSLauncher.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: packages/ios/build/*.ipa

  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RQBBOX OS ${{ github.ref_name }}
          files: |
            windows-build/**
            macos-build/**
            linux-build/**
            android-build/**
            ios-build/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
