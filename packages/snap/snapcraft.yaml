name: rqbbox-os
version: '1.0.0'
summary: RQBBOX OS — Immersive Gaming Console OS
description: |
  A high-performance, immersive gaming console operating system designed
  for streamlined discovery, library management, and instant play.
  Powered by rtech team / rtech studios.

grade: stable
confinement: strict
base: core22

architectures:
  - build-on: amd64
  - build-on: arm64

apps:
  rqbbox-os:
    command: bin/rqbbox-os
    desktop: usr/share/applications/rqbbox-os.desktop
    plugs:
      - network
      - network-bind
      - desktop
      - desktop-legacy
      - x11
      - wayland
      - audio-playback
      - opengl
      - home

parts:
  rqbbox-os:
    plugin: npm
    source: .
    npm-node-version: '20.11.0'
    build-snaps:
      - node/20/stable
    override-build: |
      npm ci
      npm run build:all
      craftctl default
