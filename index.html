<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RQBBOX OS - Portable USB Gaming Platform</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050810;color:#e8f0ff;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center;padding:20px}
.logo{font-size:4rem;margin-bottom:16px;animation:pulse 2s ease-in-out infinite}
h1{font-size:2.2rem;font-weight:700;background:linear-gradient(135deg,#00d4ff,#9d4edd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
p{color:#8b9dc3;max-width:500px;line-height:1.6;margin-bottom:24px}
.btn-group{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn{display:inline-block;padding:12px 28px;border-radius:14px;font-size:1rem;font-weight:600;text-decoration:none;transition:all .2s;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#00d4ff,#9d4edd);color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,212,255,.3)}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.1);color:#8b9dc3}
.btn-ghost:hover{border-color:#00d4ff;color:#00d4ff;transform:translateY(-2px)}
.meta{font-size:.75rem;color:#5a6a8a;margin-top:32px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
</style>
<script>setTimeout(()=>{window.location.href='System/Website/index.html'},3000)</script>
</head>
<body>
<div class="logo">🎮</div>
<h1>RQBBOX OS</h1>
<p>Portable USB Gaming Platform — Plug Into Gaming.</p>
<div class="btn-group">
<a class="btn btn-primary" href="System/Website/index.html">Enter Website</a>
<a class="btn btn-ghost" href="https://github.com/Rtech-Rqbbox-os/rqbbox-os" target="_blank">GitHub</a>
</div>
<div class="meta">Redirecting to website in 3 seconds...</div>
</body>
</html>
